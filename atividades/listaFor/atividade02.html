<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="html.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 02</title>
</head>
<body>
    <script>
        let quantidade = 0;
        for(let i = 0; i <= 70; i++){
            if(i % 7 == 0){
                quantidade++;
                console.log(`Os números múltiplos de 7 são: ${i}`)
            }
        }
        console.log(`A quantidade de números múltiplos de 7 é: ${quantidade}`)
    </script>
</body>
</html>

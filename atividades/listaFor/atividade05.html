<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="html.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 05</title>
</head>
<body>
    <script>
    let inicio = parseInt(prompt("Digite um número maior que 1:"));

    let soma = 0;

    for(let i = 1; i <= inicio; i++){
        soma += i;
    }

    console.log(`O somatório entre 1 e ${inicio} é: ${soma}`);
</script>
</body>
</html>

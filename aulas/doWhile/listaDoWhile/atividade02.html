<!DOCTYPE html>
<html lang="en">
<head>

    <title>Atividade 02</title>
</head>
<body>
    <Script>
        let numero = 0;
        
        do{
            numero1 = parseInt(prompt("Digite um número:"))
            numero2 = parseInt(prompt("Digite outro número(mais 19 vezes):"))
            numero3 = parseInt(prompt("Digite outro número(mais 18 vezes):"))
            numero4 = parseInt(prompt("Digite outro número(mais 17 vezes):"))
            numero5 = parseInt(prompt("Digite outro número(mais 16 vezes):"))
            numero6 = parseInt(prompt("Digite outro número(mais 15 vezes):"))
            numero7 = parseInt(prompt("Digite outro número(mais 14 vezes):"))
            numero8 = parseInt(prompt("Digite outro número(mais 13 vezes):"))
            numero9 = parseInt(prompt("Digite outro número(mais 12 vezes):"))
            numero10 = parseInt(prompt("Digite outro número(mais 11 vezes):"))
            numero11 = parseInt(prompt("Digite outro número(mais 10 vezes):"))
            numero12 = parseInt(prompt("Digite outro número(mais 9 vezes):"))
            numero13 = parseInt(prompt("Digite outro número(mais 8 vezes):"))
            numero14 = parseInt(prompt("Digite outro número(mais 7 vezes):"))
            numero15 = parseInt(prompt("Digite outro número(mais 6 vezes):"))
            numero16 = parseInt(prompt("Digite outro número(mais 5 vezes):"))
            numero17 = parseInt(prompt("Digite outro número(mais 4 vezes):"))
            numero18 = parseInt(prompt("Digite outro número(mais 3 vezes):"))
            numero19 = parseInt(prompt("Digite outro número(mais 2 vezes):"))
            numero20 = parseInt(prompt("Digite outro número (última vez):"))

            let soma = (numero1 + numero2 + numero3 + numero4 + numero5 + numero6 + numero7 + numero8 + numero9 + numero10 + numero11 + numero12 + numero13 + numero14 + numero15 + numero16 + numero17 + numero18 + numero19 + numero20)

            alert(`O resultado da soma dos 20 números é ${soma}`);
        }while(numero == 0);
    </Script>
</body>

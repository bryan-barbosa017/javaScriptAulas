<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="html.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 01</title>
</head>
<body>
    <Script>
        let tabuada;

        do{
            tabuada = parseInt(prompt("Digite um número de 1 a 10:"))

            alert(`Tabuada do ${tabuada}:
                \n${tabuada} x 0 = ${tabuada * 0}
                \n${tabuada} x 1 = ${tabuada * 1}
                \n${tabuada} x 2 = ${tabuada * 2}
                \n${tabuada} x 3 = ${tabuada * 3}
                \n${tabuada} x 4 = ${tabuada * 4}
                \n${tabuada} x 5 = ${tabuada * 5}
                \n${tabuada} x 6 = ${tabuada * 6}
                \n${tabuada} x 7 = ${tabuada * 7}
                \n${tabuada} x 8 = ${tabuada * 8}
                \n${tabuada} x 9 = ${tabuada * 9}
                \n${tabuada} x 10 = ${tabuada * 10}`);
        }while(true);
    </Script>
</body>
</html>

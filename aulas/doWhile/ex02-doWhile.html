<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="html.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exemplo 01 - Do While</title>
</head>
<body>
    <Script>
        let resultadoDoDado;

        do{
            resultadoDoDado = Math.floor(Math.random() * 6) + 1;
            alert("O dado que você rolou e o resultado foi:" +resultadoDoDado);
        }while(resultadoDoDado != 6);
        alert(`Você tirou seis no dado! Parabéns!`);
    </Script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="html.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exemplo 01 - Do While</title>
</head>
<body>
    <Script>
        let numero;

        do{
            numero = parseInt(prompt("Digite um número positivo:"));
        }while(numero <= 0);
        alert(`O número digitado foi: ${numero}`);
    </Script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="html.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exemplo 01 - Do While</title>
</head>
<body>
    <Script>
        let numeroSecreto = 5;
        let numeroDoPalpite;

        do{
            numeroDoPalpite = parseInt(prompt("Digite seu palpite:"));
        }while(numeroDoPalpite !== numeroSecreto);
        alert(`Parabéns! Você adivinhou o número secreto ${numeroSecreto}! :D`);
    </Script>
</body>
</html>

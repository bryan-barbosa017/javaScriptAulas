<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="html.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo 01 - For Pares</title>
</head>
<body>
    <script>
        for(let inicio = 0; inicio <= 10; inicio++){
            if(inicio % 2 == 0){
                alert(`Os números pares entre 1 e 10 são: ${inicio}`)
            }
        }
    </script>
</body>
</html>

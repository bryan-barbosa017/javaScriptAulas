<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="html.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo 03-Negativo</title>
</head>
<body>
    <script>
        let numero = 0;
        
        while(numero >= 0){
            numero = parseInt(prompt("Digite um número:"));
            if(numero >= 0){
                alert(`Número digitado: ${numero}`)
            }
        }
        alert("Você digitou um número negativo. Fim do programa!");
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 4</title>
</head>
<body>
    <script>
        let valor1 = parseFloat(prompt("Digite o valor 1:"));
        let valor2 = parseFloat(prompt("Digite o valor 2:"));
        let valor3 = parseFloat(prompt("Digite o valor 3:"));

        if(valor1 > valor2 && valor2 > valor3){
            alert("A ordem dos números é: " +valor3+ "," +valor2+ "," +valor1);//3 2 1
        }else if(valor1 > valor3 && valor3 > valor2){
            alert("A ordem dos números é: " +valor3+ "," +valor1+ "," +valor2);//3 1 2
        }else if(valor3 > valor1 && valor1 > valor2){
            alert("A ordem dos números é: " +valor2+ "," +valor1+ "," +valor3);//2 1 3
        }else if(valor1 > valor3 && valor3 > valor2){
            alert("A ordem dos números é: " +valor2+ "," +valor3+ "," +valor1);//2 3 1
        }else if(valor3 > valor2 && valor2 > valor1){
            alert("A ordem dos números é: " +valor1+ "," +valor2+ "," +valor3);//1 2 3
        }else if(valor2 > valor3 && valor3 > valor1){
            alert("A ordem dos números é: " +valor1+ "," +valor3+ "," +valor2);//1 3 2
        }else{
            alert("Dois ou mais números iguais!");
        }
    </script>
</body>
</html>

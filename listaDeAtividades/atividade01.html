<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 1</title>
</head>
<body>
    <script>
        let prova1 = 4;
        let prova2 = 3;
        let prova3 = 3;

        let nota1 = parseFloat(prompt("Digite a nota 1:"));
        let nota2 = parseFloat(prompt("Digite a nota 2:"));
        let nota3 = parseFloat(prompt("Digite a nota 3:"));

        let notap1 = nota1 * prova1;
        let notap2 = nota2 * prova2;
        let notap3 = nota3 * prova3;
        let resultado = (notap1 + notap2 + notap3) / 10;

        if(resultado >= 7){
            alert("Aprovado! :D");
        }else if(resultado >= 5){
            alert("Recuperação! :P");
        }else{
            alert("Reprovado! :(")
        }
    </script>
</body>
</html>

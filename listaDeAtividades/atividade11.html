<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 11</title>
</head>
<body>
    <script>
        let idade = parseFloat(prompt("Digite sua idade"));

        if(idade < 12){
            alert("Você tem acesso ao conteúdo infantil");
        }else if(idade >= 12 && idade <= 17){
            alert("Você tem acesso ao conteúdo para adolescentes");
        }else if(idade >= 18){
            alert("Você tem acesso ao conteúdo adulto");
        }
    </script>
</body>
</html>

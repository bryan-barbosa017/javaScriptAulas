<body>
    <script>
        let valor = parseFloat(prompt("Digite um número entre 0 e 10:"));

        if(valor === 0 || valor === 2 || valor === 4 || valor === 6 || valor === 8 || valor === 10){
            alert("Esse número é par")
        }else{
            alert("Esse número é ímpar")
        }
    </script>

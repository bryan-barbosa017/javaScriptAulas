<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 5</title>
</head>
<body>
    <script>
        let idade = parseFloat(prompt("Digite sua idade:"));

        if(idade <= 4){
            alert("Você não pode participar!")
        }else if(idade >= 5){
            alert("Você está na categoria Infantil A!");
        }else if(idade >= 8){
            alert("Você está na categoria Infantil B!");
        }else if(idade >= 11){
            alert("Você está na categoria Juvenil A!");
        }else if(idade >= 14){
            alert("Você está na categoria Juvenil B!");
        }else if(idade >= 18){
            alert("Você está na categoria Adulto!");
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 9</title>
</head>
<body>
    <script>
        let lado1 = parseFloat(prompt("Digite o valor do lado 1: "));
        let lado2 = parseFloat(prompt("Digite o valor do lado 2: "));
        let lado3 = parseFloat(prompt("Digite o valor do lado 3: "));

        if(lado1 == lado2 && lado1 == lado3 && lado2 == lado3){
            alert("Esse triângulo é equilátero");
        }else if((lado1 == lado2 && lado1 == lado2 && lado2 != lado3) || (lado1 == lado2 && lado1 != lado2 && lado2 == lado3) || (lado1 != lado2 && lado1 == lado2 && lado2 == lado3)){
            alert("Esse triângulo é isósceles");
        }else if(lado1 != lado2 && lado1 != lado2 && lado2 != lado3){
            alert("Esse triângulo é escaleno");
        }
    </script>
</body>
</html>
